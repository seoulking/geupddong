<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>급똥 시뮬레이션</title>
    <script>
      // Firebase 설정을 전역 변수로 설정
      // 실제 값은 Firebase Console에서 가져와야 합니다
      // 또는 환경 변수로 주입할 수 있습니다
      window.__FIREBASE_CONFIG__ = window.__FIREBASE_CONFIG__ || {};
      
      // Firebase Hosting의 자동 초기화 스크립트 로드 시도
      if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) {
        try {
          const app = firebase.app();
          const config = app.options;
          window.__FIREBASE_CONFIG__ = {
            apiKey: config.apiKey,
            authDomain: config.authDomain,
            projectId: config.projectId,
            storageBucket: config.storageBucket,
            messagingSenderId: config.messagingSenderId,
            appId: config.appId
          };
        } catch (e) {
          console.warn('Firebase 자동 설정을 가져올 수 없습니다:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
